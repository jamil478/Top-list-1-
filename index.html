<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AETHER | The Kinetic Experience</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@100;400;900&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            scrollbar-width: none; /* Firefox */
        }
        body::-webkit-scrollbar { display: none; }

        .syncopate { font-family: 'Syncopate', sans-serif; }

        /* Background Canvas */
        #bg-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
        }

        /* Overlay Layout */
        section {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            z-index: 10;
            pointer-events: none;
        }

        .reveal-text {
            font-size: clamp(2rem, 10vw, 8rem);
            line-height: 0.9;
            text-align: center;
            opacity: 0;
            transform: translateY(50px);
            transition: 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .active .reveal-text {
            opacity: 1;
            transform: translateY(0);
        }

        .glass-tag {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 10px 25px;
            border-radius: 100px;
            font-size: 10px;
            letter-spacing: 5px;
            text-transform: uppercase;
            pointer-events: auto;
        }

        /* Nav */
        nav {
            position: fixed;
            top: 0; width: 100%;
            padding: 40px;
            display: flex;
            justify-content: space-between;
            z-index: 100;
        }

        .footer-info {
            position: fixed;
            bottom: 40px;
            width: 100%;
            padding: 0 40px;
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            letter-spacing: 3px;
            opacity: 0.4;
            z-index: 100;
        }

    </style>
</head>
<body>

    <nav>
        <div class="syncopate text-xl">AETHER<span class="text-[#c5a059]">.</span></div>
        <div class="text-[10px] tracking-widest opacity-40 uppercase">Interactive Lab</div>
    </nav>

    <canvas id="bg-canvas"></canvas>

    <section class="active">
        <div class="glass-tag mb-8">Architecting Future</div>
        <h1 class="reveal-text syncopate">INFINITE<br><span class="opacity-20 italic">VOID</span></h1>
    </section>

    <section>
        <h2 class="reveal-text syncopate">CRAFTING<br><span class="text-[#c5a059]">EMOTIONS</span></h2>
        <div class="glass-tag mt-12">Through Code</div>
    </section>

    <section>
        <h2 class="reveal-text syncopate">GLOBAL<br><span class="opacity-20">STANDARDS</span></h2>
        <div class="mt-20 pointer-events-auto">
            <a href="mailto:jamilhassanxy@gmail.com" class="glass-tag hover:bg-white hover:text-black transition duration-500">Contact Studio</a>
        </div>
    </section>

    <div class="footer-info uppercase">
        <div>Jamil Hassan // 2026</div>
        <div>Dhaka - Global // v5.0</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, points;
        let scrollY = 0;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 3;

            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('bg-canvas'), antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);

            const geometry = new THREE.IcosahedronGeometry(2, 25);
            const material = new THREE.PointsMaterial({ 
                color: 0xffffff, 
                size: 0.015, 
                transparent: true, 
                opacity: 0.3,
                blending: THREE.AdditiveBlending 
            });
            points = new THREE.Points(geometry, material);
            scene.add(points);

            window.addEventListener('scroll', () => {
                scrollY = window.scrollY;
                
                // Active Section logic
                const sections = document.querySelectorAll('section');
                sections.forEach((sec, i) => {
                    const top = sec.offsetTop;
                    if (scrollY >= top - 200) {
                        sections.forEach(s => s.classList.remove('active'));
                        sec.classList.add('active');
                    }
                });
            });

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            
            // Kinetic Rotation based on Scroll
            points.rotation.y += 0.002;
            points.rotation.x = scrollY * 0.001;
            
            // Zoom effect based on scroll
            const scale = 1 + (scrollY * 0.0005);
            points.scale.set(scale, scale, scale);

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
